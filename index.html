<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест: Последний из династии Романовых</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root {
            --gold: #d4af37;
            --royal-blue: #1a2a6c;
            --white: #ffffff;
            --dark: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: var(--dark);
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #quiz-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 90%;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        h1 {
            color: var(--royal-blue);
            font-size: 24px;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--gold);
            padding-bottom: 10px;
        }

        .question {
            font-size: 20px;
            margin-bottom: 25px;
            font-weight: 600;
        }

        .options {
            display: grid;
            gap: 15px;
        }

        button {
            padding: 15px 25px;
            font-size: 16px;
            cursor: pointer;
            background: var(--white);
            border: 2px solid var(--royal-blue);
            border-radius: 10px;
            transition: all 0.3s ease;
            outline: none;
        }

        button:hover {
            background: var(--royal-blue);
            color: white;
            transform: translateY(-2px);
        }

        #result-container {
            display: none;
        }

        .score {
            font-size: 48px;
            color: var(--gold);
            font-weight: bold;
            margin: 20px 0;
        }

        .progress-bar {
            height: 10px;
            background: #eee;
            border-radius: 5px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--gold);
            width: 0%;
            transition: width 0.5s ease;
        }

        .restart-btn {
            background: var(--gold);
            color: white;
            border: none;
            margin-top: 20px;
        }

        .restart-btn:hover {
            background: #b8962d;
        }
    </style>
</head>
<body>

<div id="quiz-container" class="animate__animated animate__fadeIn">
    <div id="quiz-content">
        <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
        <div id="question-box">
            <p class="question" id="question-text"></p>
            <div class="options" id="options-box"></div>
        </div>
    </div>

    <div id="result-container" class="animate__animated animate__zoomIn">
        <h1>Тест завершен!</h1>
        <p>Ваш результат:</p>
        <div class="score" id="score-text"></div>
        <p id="feedback-text"></p>
        <button class="restart-btn" onclick="location.reload()">Пройти еще раз</button>
    </div>
</div>

<script>
    const questions = [
        {
            q: "В каком году Николай II взошел на престол?",
            options: ["1881", "1894", "1896", "1905"],
            correct: 1
        },
        {
            q: "Какое трагическое событие произошло во время коронации?",
            options: ["Кровавое воскресенье", "Ленский расстрел", "Давка на Ходынском поле", "Восстание на Потемкине"],
            correct: 2
        },
        {
            q: "Кто был ключевой фигурой экономических реформ в начале правления?",
            options: ["П.А. Столыпин", "Г. Распутин", "С.Ю. Витте", "В.К. Плеве"],
            correct: 2
        },
        {
            q: "Какая война 1904-1905 гг. закончилась поражением России?",
            options: ["Первая мировая", "Русско-японская", "Крымская", "Балканская"],
            correct: 1
        },
        {
            q: "Когда Николай II подписал Манифест об отречении?",
            options: ["25 октября 1917", "9 января 1905", "2 марта 1917", "17 июля 1918"],
            correct: 2
        }
    ];

    let currentQuestion = 0;
    let score = 0;

    const questionText = document.getElementById("question-text");
    const optionsBox = document.getElementById("options-box");
    const progressFill = document.getElementById("progress");
    const quizContent = document.getElementById("quiz-content");
    const resultContainer = document.getElementById("result-container");
    const scoreText = document.getElementById("score-text");
    const feedbackText = document.getElementById("feedback-text");

    function loadQuestion() {
        const qData = questions[currentQuestion];
        questionText.innerText = qData.q;
        optionsBox.innerHTML = "";
        
        progressFill.style.width = `${(currentQuestion / questions.length) * 100}%`;

        qData.options.forEach((opt, index) => {
            const btn = document.createElement("button");
            btn.innerText = opt;
            btn.className = "animate__animated animate__fadeInUp";
            btn.style.animationDelay = `${index * 0.1}s`;
            btn.onclick = () => checkAnswer(index);
            optionsBox.appendChild(btn);
        });
    }

    function checkAnswer(index) {
        if (index === questions[currentQuestion].correct) {
            score++;
        }

        currentQuestion++;

        if (currentQuestion < questions.length) {
            loadQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        quizContent.style.display = "none";
        resultContainer.style.display = "block";
        scoreText.innerText = `${score} / ${questions.length}`;
        
        if (score === questions.length) {
            feedbackText.innerText = "Великолепно! Вы настоящий знаток истории Романовых.";
        } else if (score >= 3) {
            feedbackText.innerText = "Хороший результат. Вы внимательно изучили проект.";
        } else {
            feedbackText.innerText = "Стоит еще раз ознакомиться с материалами проекта.";
        }
    }

    loadQuestion();
</script>

</body>
</html>
