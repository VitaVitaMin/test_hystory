<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Исторический тест: Николай II</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Georgia', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #app-container {
            width: 100%;
            max-width: 700px;
            padding: 40px;
            background: #1a1a1a;
            border: 1px solid #333;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            position: relative;
        }

        h1 {
            font-size: 28px;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-bottom: 1px solid #444;
            padding-bottom: 20px;
            margin-bottom: 30px;
            color: #fff;
        }

        p {
            line-height: 1.6;
            color: #bbb;
        }

        .btn {
            background: transparent;
            border: 1px solid #555;
            color: #fff;
            padding: 15px 30px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.4s ease;
            margin-top: 20px;
            width: 100%;
        }

        .btn:hover {
            background: #fff;
            color: #000;
            border-color: #fff;
        }

        .option-btn {
            text-align: left;
            margin-bottom: 15px;
            display: block;
            width: 100%;
        }

        #quiz-section, #result-section {
            display: none;
        }

        .progress-container {
            width: 100%;
            height: 2px;
            background: #333;
            margin-bottom: 40px;
        }

        .progress-bar {
            height: 100%;
            background: #fff;
            width: 0%;
            transition: width 0.5s ease;
        }

        .question-text {
            font-size: 22px;
            margin-bottom: 30px;
            color: #fff;
        }

        .score-circle {
            font-size: 60px;
            border: 2px solid #fff;
            width: 150px;
            height: 150px;
            line-height: 150px;
            border-radius: 50%;
            margin: 30px auto;
        }

        .footer-credits {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #333;
            font-size: 12px;
            color: #666;
            font-style: italic;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div id="app-container" class="animate__animated animate__fadeIn">
    
    <div id="start-section">
        <h1>Последний из династии Романовых</h1>
        <p>Итоговый тест по материалам исследовательского проекта.<br>Проверьте свои знания о правлении и судьбе Николая II.</p>
        <button class="btn" onclick="startQuiz()">Начать тестирование</button>
    </div>

    <div id="quiz-section">
        <div class="progress-container">
            <div class="progress-bar" id="progress"></div>
        </div>
        <div id="question-box">
            <div class="question-text" id="q-text"></div>
            <div id="options-container"></div>
        </div>
    </div>

    <div id="result-section" class="animate__animated animate__fadeIn">
        <h1>Результат</h1>
        <div class="score-circle" id="final-score">0</div>
        <p id="result-comment"></p>
        <button class="btn" onclick="location.reload()">Вернуться к началу</button>
    </div>

    <div class="footer-credits">
        Сайт изготовил ученик 9В класса Юминов Даниил Андреевич с помощью нейросети Gemini
    </div>

</div>

<script>
    const questions = [
        {
            q: "В каком году Николай II взошел на престол?",
            options: ["1881", "1894", "1896", "1905"],
            correct: 1
        },
        {
            q: "Какое событие 1896 года стало трагическим началом правления?",
            options: ["Кровавое воскресенье", "Ходынская катастрофа", "Убийство Столыпина", "Цусимское сражение"],
            correct: 1
        },
        {
            q: "Кто был автором масштабной аграрной реформы?",
            options: ["С.Ю. Витте", "Г.Е. Распутин", "П.А. Столыпин", "В.Н. Коковцов"],
            correct: 2
        },
        {
            q: "Какое событие привело к изданию Манифеста 17 октября?",
            options: ["Первая мировая война", "Революция 1905-1907 гг.", "Февральская революция", "Январское восстание"],
            correct: 1
        },
        {
            q: "Где произошло подписание манифеста об отречении Николая II?",
            options: ["В Зимнем дворце", "В Тобольске", "На станции Дно", "В Ипатьевском доме"],
            correct: 2
        }
    ];

    let currentQ = 0;
    let score = 0;

    function startQuiz() {
        document.getElementById('start-section').classList.add('animate__animated', 'animate__fadeOut');
        setTimeout(() => {
            document.getElementById('start-section').style.display = 'none';
            document.getElementById('quiz-section').style.display = 'block';
            showQuestion();
        }, 500);
    }

    function showQuestion() {
        const q = questions[currentQ];
        document.getElementById('q-text').innerText = q.q;
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        document.getElementById('progress').style.width = (currentQ / questions.length) * 100 + '%';

        q.options.forEach((opt, i) => {
            const b = document.createElement('button');
            b.className = 'btn option-btn animate__animated animate__fadeInUp';
            b.style.animationDelay = (i * 0.1) + 's';
            b.innerText = opt;
            b.onclick = () => next(idx = i);
            container.appendChild(b);
        });
    }

    function next(idx) {
        if(idx === questions[currentQ].correct) score++;
        currentQ++;
        if(currentQ < questions.length) {
            showQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById('quiz-section').style.display = 'none';
        document.getElementById('result-section').style.display = 'block';
        document.getElementById('final-score').innerText = score;
        
        let msg = "";
        if(score === 5) msg = "Выдающиеся знания исторического материала.";
        else if(score >= 3) msg = "Хороший уровень владения темой.";
        else msg = "Рекомендуется повторное изучение материалов проекта.";
        document.getElementById('result-comment').innerText = msg;
    }
</script>

</body>
</html>
